<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaiOS Universal Storage Dashboard</title>
    <style>
        :root {
            --bg-dark: #1e1e2e;
            --bg-panel: #252537;
            --primary: #8e44ad;
            --accent: #00d2d3;
            --text-main: #ecf0f1;
            --text-muted: #95a5a6;
            --border: #34344a;
            --console-bg: #101015;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warn: #f1c40f;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Menlo, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Desktop default: hidden (panels scroll) */
        }

        /* --- RESPONSIVE HEADER --- */
        header {
            background: var(--bg-panel);
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allows wrapping on mobile */
            gap: 10px;
            flex-shrink: 0;
        }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1.1rem; min-width: 200px; }
        .brand svg { fill: var(--accent); width: 24px; height: 24px; }
        
        .top-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        select { background: var(--bg-dark); color: white; border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; outline: none; font-size: 0.9rem; }
        
        button {
            background: var(--primary); color: white; border: none; padding: 7px 14px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.85rem; transition: 0.2s; white-space: nowrap;
        }
        button:hover { filter: brightness(1.2); }
        button.btn-danger { background: var(--danger); }
        button.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        button.btn-outline:hover { background: var(--border); color: white; }

        /* --- MAIN GRID LAYOUT --- */
        .main-container {
            display: grid;
            /* Desktop: Sidebar (260px) | Editor (Flex) */
            grid-template-columns: 260px 1fr;
            /* Desktop: Top Area (Flex) | Bottom Console (250px) */
            grid-template-rows: 1fr 250px;
            flex-grow: 1;
            overflow: hidden;
            width: 100%;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            grid-column: 1;
            grid-row: 1 / -1; /* Spans full height on desktop */
            background: #191925;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header { padding: 12px; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
        
        .file-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .file-item {
            padding: 10px 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 1px solid #2a2a35; transition: 0.2s;
        }
        .file-item:hover { background: var(--bg-panel); border-left: 3px solid var(--accent); }
        .file-item svg { width: 18px; height: 18px; fill: var(--text-muted); flex-shrink: 0; }
        .file-info { display: flex; flex-direction: column; width: 100%; min-width: 0; /* Fix flex text overflow */ }
        .file-name { font-size: 0.9rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        /* --- EDITOR AREA --- */
        .editor-area {
            grid-column: 2;
            grid-row: 1;
            padding: 20px;
            overflow-y: auto;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; }
        .input-group input, .input-group textarea {
            width: 100%; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 6px; font-family: 'Consolas', monospace; font-size: 0.95rem; transition: border 0.2s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent); outline: none; }
        .input-group textarea { resize: vertical; min-height: 200px; line-height: 1.5; }

        .editor-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }

        /* --- BOTTOM PANEL (CONSOLE) --- */
        .bottom-panel {
            grid-column: 2;
            grid-row: 2;
            background: var(--console-bg);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr; /* Command Runner | Logs */
            overflow: hidden;
        }
        
        .cmd-runner { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-header { background: #2a2a35; padding: 6px 12px; font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .cmd-input { flex-grow: 1; background: transparent; border: none; color: #a9b7c6; padding: 10px; font-family: monospace; resize: none; outline: none; font-size: 0.9rem; }
        
        .console-logs { overflow-y: auto; padding: 10px; font-family: monospace; font-size: 0.85rem; background: var(--console-bg); }
        .log-entry { margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 4px; word-break: break-word; }
        .log-time { color: #555; margin-right: 8px; font-size: 0.75rem; }
        .log-info { color: var(--accent); }
        .log-success { color: var(--success); }
        .log-error { color: var(--danger); }
        .log-warn { color: var(--warn); }

        .icon { width: 16px; height: 16px; fill: currentColor; }

        /* --- MOBILE BREAKPOINT (Tablets & Phones) --- */
        @media (max-width: 850px) {
            body { height: auto; overflow-y: auto; } /* Allow full page scroll */
            
            .main-container {
                display: flex;
                flex-direction: column;
                height: auto;
                overflow: visible;
            }

            /* Stack Sidebar */
            .sidebar {
                grid-column: auto;
                grid-row: auto;
                width: 100%;
                max-height: 250px; /* Limit height so it doesn't take full screen */
                border-right: none;
                border-bottom: 1px solid var(--border);
                order: 1; /* Sidebar First */
            }

            /* Stack Editor */
            .editor-area {
                grid-column: auto;
                grid-row: auto;
                order: 2; /* Editor Second */
                overflow: visible;
                height: auto;
            }

            /* Stack Console */
            .bottom-panel {
                grid-column: auto;
                grid-row: auto;
                order: 3; /* Console Last */
                height: auto;
                display: flex;
                flex-direction: column-reverse; /* Logs above command runner on mobile usually better, or keep standard */
                border-top: 1px solid var(--border);
            }

            .cmd-runner {
                height: 150px;
                border-right: none;
                border-top: 1px solid var(--border);
            }

            .console-logs {
                height: 200px;
                max-height: 40vh;
            }

            /* Adjust header for small screens */
            header { flex-direction: column; align-items: stretch; }
            .brand { justify-content: center; margin-bottom: 10px; }
            .top-controls { flex-direction: column; width: 100%; }
            select, button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- IMPORT POLYFILL -->
    <script src="kaios-storage-2.5.js"></script>
 <script src="kaios-storage-3.0.js"></script>
    <!-- HEADER -->
    <header>
        <div class="brand">
            <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
            <span>KaiOS Storage Studio</span>
        </div>
        <div class="top-controls">
            <select id="apiMode" onchange="refreshFileList()">
                <option value="2.5">API: KaiOS 2.5 (DOMRequest)</option>
                <option value="3.0">API: KaiOS 3.0 (Async/Promise)</option>
            </select>
            <select id="storageMode" onchange="refreshFileList()">
                <option value="internal">Drive: Internal (sdcard)</option>
                <option value="external">Drive: External (sdcard1)</option>
            </select>
            <button class="btn-outline" onclick="window.location.href = window.location.href.split('?')[0] + '?mode=explorer'">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
                Legacy UI
            </button>
            <button class="btn-danger" onclick="window.location.href = window.location.href.split('?')[0]">
                <svg class="icon" viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5a2 2 0 00-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 002 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                Reset
            </button>
        </div>
    </header>

    <div class="main-container">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span>File Explorer</span>
                <span style="cursor: pointer; padding:5px;" onclick="refreshFileList()" title="Refresh">↻</span>
            </div>
            <ul class="file-list" id="fileList">
                <li style="padding:15px; color:#666; text-align:center;">Loading...</li>
            </ul>
            <div style="padding: 10px; border-top: 1px solid var(--border); background: #191925;">
                <small style="color:var(--text-muted); display:flex; justify-content:space-between;">
                    <span>Storage Usage</span>
                    <span id="storageLabel">Calculating...</span>
                </small>
                <div style="background:#333; height:4px; border-radius:2px; margin-top:5px; overflow:hidden;">
                    <div id="spaceBar" style="background:var(--accent); width:0%; height:100%; transition: width 0.5s;"></div>
                </div>
            </div>
        </aside>

        <!-- MAIN EDITOR -->
        <main class="editor-area">
            <h2 style="margin-top:0; border-bottom:1px solid var(--border); padding-bottom:10px; font-size:1.1rem; color: var(--text-muted);">Editor</h2>
            
            <div class="input-group">
                <label>Filename</label>
                <input type="text" id="fileName" value="demo.js" placeholder="example.txt">
            </div>

            <div class="input-group">
                <label>Content</label>
                <textarea id="fileContent" placeholder="Enter file content here...">console.log("Hello KaiOS!");</textarea>
            </div>

            <div class="editor-actions">
                <button onclick="actions.save()">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
                    Save File
                </button>
                <button class="btn-outline" onclick="actions.read()">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    Read
                </button>
                <button class="btn-danger" onclick="actions.delete()">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    Delete
                </button>
            </div>
        </main>

        <!-- BOTTOM PANEL -->
        <div class="bottom-panel">
            
            <!-- JS RUNNER -->
            <div class="cmd-runner">
                <div class="panel-header">
                    <span>Command Runner (JS)</span>
                    <button class="btn-outline" style="padding: 2px 8px; font-size: 0.7rem;" onclick="runCommand()">▶ Run</button>
                </div>
                <textarea class="cmd-input" id="cmdInput" spellcheck="false" placeholder="// 'storage' refers to the currently selected drive.
// For KaiOS 3.0: internal=sdcard, external=sdcard1
storage.freeSpace().onsuccess = function() {
  log('Free Space: ' + this.result);
}">
// Get Free Space info (works for both sdcard & sdcard1)
storage.freeSpace().onsuccess = function() {
  log("Free Space: " + (this.result/1024/1024).toFixed(2) + " MB", "success");
}</textarea>
            </div>

            <!-- CONSOLE LOGS -->
            <div class="console-logs" id="consoleOutput">
                <div class="log-entry"><span class="log-time">[System]</span> Dashboard Ready. KaiOS 3.0 dual-storage: sdcard (internal) + sdcard1 (external).</div>
            </div>

        </div>
    </div>

    <!-- LOGIC -->
    <script>
        // --- LOGGER ---
        const consoleEl = document.getElementById('consoleOutput');
        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString([], { hour12: false });
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${msg}</span>`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // --- CORE HELPERS ---
        function getContext() {
            const api   = document.getElementById('apiMode').value;
            const drive = document.getElementById('storageMode').value; // 'internal' | 'external'

            let storage;
            if (api === '2.5') {
                // KaiOS 2.5: navigator.getDeviceStorages() returns an array.
                // Index 0 = internal sdcard, index 1 = external sdcard1.
                const storages = navigator.getDeviceStorages('sdcard');
                storage = (drive === 'internal') ? storages[0] : (storages[1] || storages[0]);
            } else {
                // KaiOS 3.0: navigator.b2g.getDeviceStorage() takes a type string.
                // Internal  → "sdcard"
                // External  → "sdcard1"  (separate volume / IDBObjectStore)
                const type = (drive === 'internal') ? 'sdcard' : 'sdcard1';
                storage = navigator.b2g.getDeviceStorage(type);
            }
            return { storage, api, drive };
        }

        // --- ACTIONS ---

        // Helper: strip the /<type>/ prefix that the polyfill adds to File.name
        // e.g. "/sdcard/demo.txt" → "demo.txt"
        function stripPrefix(name) {
            return name.replace(/^\/[^/]+\//, '');
        }

        const actions = {
            save: function() {
                const { storage, api, drive } = getContext();
                const name    = document.getElementById('fileName').value.trim();
                const content = document.getElementById('fileContent').value;
                if (!name) { log('Filename is empty!', 'error'); return; }
                const blob = new Blob([content], { type: 'text/plain' });
                log(`[${drive === 'internal' ? 'sdcard' : 'sdcard1'}] Saving '${name}'…`);

                if (api === '2.5') {
                    const req = storage.addNamed(blob, name);
                    req.onsuccess = () => { log(`Saved: ${req.result}`, 'success'); refreshFileList(); };
                    req.onerror   = () => log(`Save Failed: ${req.error.name}`, 'error');
                } else {
                    // KaiOS 3.0 — StorageRequest is also thenable
                    const req = storage.addNamed(blob, name);
                    req.onsuccess = (e) => { log(`Saved: ${e.target.result}`, 'success'); refreshFileList(); };
                    req.onerror   = (e) => log(`Save Failed: ${e.target.error.name}`, 'error');
                }
            },

            read: function() {
                const { storage, api, drive } = getContext();
                let name = document.getElementById('fileName').value.trim();
                if (!name) { log('Filename is empty!', 'error'); return; }
                // Strip any virtual prefix the user may have pasted from the file list
                name = stripPrefix(name);
                document.getElementById('fileName').value = name;

                const handleFile = (file) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        document.getElementById('fileContent').value = e.target.result;
                        log(`Read '${stripPrefix(file.name)}' (${file.size} bytes) from ${drive === 'internal' ? 'sdcard' : 'sdcard1'}`, 'success');
                    };
                    reader.readAsText(file);
                };

                if (api === '2.5') {
                    const req = storage.get(name);
                    req.onsuccess = () => handleFile(req.result);
                    req.onerror   = () => log(`File not found: '${name}'`, 'error');
                } else {
                    // KaiOS 3.0
                    const req = storage.get(name);
                    req.onsuccess = (e) => handleFile(e.target.result);
                    req.onerror   = (e) => log(`File not found: '${name}' — ${e.target.error.name}`, 'error');
                }
            },

            delete: function() {
                const { storage, api, drive } = getContext();
                let name = document.getElementById('fileName').value.trim();
                if (!name) { log('Filename is empty!', 'error'); return; }
                name = stripPrefix(name);
                if (!confirm(`Delete '${name}' from ${drive === 'internal' ? 'sdcard' : 'sdcard1'}?`)) return;

                if (api === '2.5') {
                    const req = storage.delete(name);
                    req.onsuccess = () => { log(`Deleted '${name}'`, 'warn'); refreshFileList(); };
                    req.onerror   = () => log(`Delete failed: ${req.error.name}`, 'error');
                } else {
                    // KaiOS 3.0
                    const req = storage.delete(name);
                    req.onsuccess = () => { log(`Deleted '${name}' from ${drive === 'internal' ? 'sdcard' : 'sdcard1'}`, 'warn'); refreshFileList(); };
                    req.onerror   = (e) => log(`Delete failed: ${e.target.error.name}`, 'error');
                }
            }
        };

        // --- FILE LIST ---
        async function refreshFileList() {
            const { storage, api, drive } = getContext();
            const listEl = document.getElementById('fileList');
            listEl.innerHTML = '<li style="padding:15px; color:#666; text-align:center;">Loading…</li>';

            const addFileUI = (file) => {
                // Strip the virtual /<type>/ prefix that polyfill adds to file.name
                const displayName = file.name.replace(/^\/[^/]+\//, '');
                const li = document.createElement('li');
                li.className = 'file-item';
                li.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    <div class="file-info">
                        <span class="file-name" title="${displayName}">${displayName}</span>
                        <span class="file-meta">${(file.size / 1024).toFixed(1)} KB · ${drive === 'internal' ? 'sdcard' : 'sdcard1'}</span>
                    </div>
                `;
                // Clicking a file puts the clean (no-prefix) name in the filename input
                li.onclick = () => {
                    document.getElementById('fileName').value = displayName;
                    actions.read();
                };
                listEl.appendChild(li);
            };

            // ── Update storage-usage bar ─────────────────────────────────────
            const updateSpaceBar = (usedBytes) => {
                // freeSpace always returns the simulated 2 GiB constant;
                // show a percentage capped at a sensible demo maximum.
                const MAX_DISPLAY = 10 * 1024; // 10 KB demo ceiling for the bar
                const pct = Math.min(100, Math.round((usedBytes / MAX_DISPLAY) * 100));
                document.getElementById('spaceBar').style.width = pct + '%';
                document.getElementById('storageLabel').innerText =
                    usedBytes < 1024
                        ? `${usedBytes} B used`
                        : `${(usedBytes / 1024).toFixed(1)} KB used`;
            };

            // ── KaiOS 2.5 path ───────────────────────────────────────────────
            if (api === '2.5') {
                // usedSpace (2.5 DOMRequest style)
                const spReq = storage.usedSpace();
                if (spReq) {
                    spReq.onsuccess = function () { updateSpaceBar(this.result || 0); };
                }

                listEl.innerHTML = ''; // clear "Loading…" once we start
                const cursor = storage.enumerate();
                cursor.onsuccess = function () {
                    if (this.result && this.result.name !== null) {
                        addFileUI(this.result);
                        this.continue();
                    } else if (listEl.children.length === 0) {
                        listEl.innerHTML = '<li style="padding:15px; color:#666; text-align:center;">No files found.</li>';
                    }
                };
                cursor.onerror = () => {
                    listEl.innerHTML = '<li style="padding:15px; color:var(--danger); text-align:center;">Enumerate error.</li>';
                };
                return;
            }

            // ── KaiOS 3.0 path (polyfill) ────────────────────────────────────
            // usedSpace() → StorageRequest (also thenable)
            try {
                const used = await storage.usedSpace();
                updateSpaceBar(used);
            } catch (_) { /* non-fatal */ }

            // enumerate() → FileIterable → async iterator
            const iterable = storage.enumerate();
            const iterator = iterable.values();
            let fileCount = 0;
            listEl.innerHTML = ''; // clear "Loading…"

            try {
                let res = await iterator.next();
                while (!res.done) {
                    if (res.value && res.value.name) {
                        addFileUI(res.value);
                        fileCount++;
                    }
                    res = await iterator.next();
                }
            } catch (err) {
                log(`Enumerate error: ${err.message || err}`, 'error');
            }

            if (fileCount === 0) {
                listEl.innerHTML = '<li style="padding:15px; color:#666; text-align:center;">No files found.</li>';
            }
        }

        // --- COMMAND RUNNER ---
        function runCommand() {
            const input = document.getElementById('cmdInput').value;
            const { storage } = getContext();
            log("Running command...", 'info');
            try {
                const func = new Function('storage', 'log', input);
                func(storage, log);
            } catch (e) {
                log(`Syntax Error: ${e.message}`, 'error');
            }
        }

        // --- INIT ---
        // KaiOS 2.5: attach "change" listeners via getDeviceStorages() array.
        // KaiOS 3.0 polyfill: attach listeners on each individual storage type
        //                     (sdcard = internal, sdcard1 = external).
        function attachChangeListeners() {
            const changeHandler = (e) => {
                log(`⚡ EVENT [${e.target ? e.target.storageName : '?'}]: ${e.reason} → ${e.path}`, 'warn');
                refreshFileList();
            };

            if (navigator.getDeviceStorages) {
                // 2.5-style: returns an array covering all volumes
                try {
                    const storages = navigator.getDeviceStorages('sdcard');
                    storages.forEach(s => s.addEventListener('change', changeHandler));
                } catch(e) { /* silently ignore if 2.5 API not available */ }
            }

            if (navigator.b2g && navigator.b2g.getDeviceStorage) {
                // 3.0-style: two separate volumes
                try {
                    navigator.b2g.getDeviceStorage('sdcard')
                        .addEventListener('change', changeHandler);
                    navigator.b2g.getDeviceStorage('sdcard1')
                        .addEventListener('change', changeHandler);
                } catch(e) { /* silently ignore if 3.0 API not available */ }
            }
        }

        attachChangeListeners();
        refreshFileList();
    </script>
</body>
</html>
